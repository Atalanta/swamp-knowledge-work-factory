# Minimal Vale config for the reviewed-document factory's lint stage.
# The vale-review extension ships no styles; this is the caller's private config.
# StylesPath is resolved relative to this file. With only built-in rules enabled,
# Vale checks spelling and basic prose hygiene — swap in a house style pack here.
StylesPath = .vale-styles

MinAlertLevel = suggestion

[*.md]
# A minimal local House style with one hedging/filler rule, so the lint stage
# has real teeth. Swap in a full house style pack (or add Vale.Spelling with a
# vocab) here for production use.
BasedOnStyles = House
