manifestVersion: 1
name: '@atalanta/meta-factory'
version: 2026.07.04.4
description: |
  Deterministically assemble a @swamp/software-factory definition from the design
  record produced by the factory-design interview. This is a swamp REPORT, not a
  model: it scopes to the interview's record_artifact method, fires when the
  consolidated `design` artifact is recorded, validates it against a zod
  DesignRecordSchema, and emits the target factory's definition object as its
  json output (plus a readable markdown rendering). A pure projection — no LLM, no
  serialisation library.

  Fidelity is hybrid — common patterns are captured as intent in the design
  record and expanded here by rule (a review stage's fresh + findings-clear +
  human-approval stack; a coverage-contract cel gate; a human sign-off), while
  uncommon needs are captured as raw gate type + config and passed through. The
  intent->grammar ruleset (expandGates) is the one opinionated surface and is
  unit-tested in isolation.

  Non-determinism lives in the interview and is captured as evidence; assembly is
  a function of it — the same design record always produces the same definition.
  The report's json is the definition object; the driver installs it as a live
  git-tracked factory as a separate explicit step, preserving swamp's
  source/runtime split (the report produces data, the driver turns it to source).

  Ships the `factory-builder` skill that drives the interview and wires this
  report, plus the bundled factory-design interview template.

  ## Use

  ```
  swamp extension pull @atalanta/meta-factory
  # invoke the bundled `factory-builder` skill; say "build me a kw factory"
  ```
repository: 'https://github.com/Atalanta/swamp-knowledge-work-factory'
models: []
workflows: []
vaults: []
drivers: []
datastores: []
reports:
  - meta_factory.ts
skills:
  - factory-builder
additionalFiles:
  - README.md
  - LICENSE.txt
  - templates/factory-design.definition.yaml
labels:
  - software-factory
  - meta
  - factory-builder
  - knowledge-work
dependencies:
  # Resolved automatically on `swamp extension pull @atalanta/meta-factory`
  # (depth-10 resolution), so a consuming repo runs ONE pull and the agent never
  # issues pull commands. @swamp/software-factory is the engine; the rest are what
  # a knowledge-work factory (and the interview's own review stage) wire:
  #   external-reviewer -> the adversarial reviewer bridge (pulls @mgreten/cli-agent)
  #   kw-review-lenses  -> the STRUCT/CRAFT/TONE prose review lenses
  #   vale-review       -> the deterministic prose linter for a gated lint stage
  - '@swamp/software-factory'
  - '@atalanta/external-reviewer'
  - '@atalanta/kw-review-lenses'
  - '@atalanta/vale-review'
