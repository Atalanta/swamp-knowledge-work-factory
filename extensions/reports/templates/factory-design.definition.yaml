# Template body for the `factory-design` interview factory.
#
# The factory-builder skill's setup runbook writes this into a freshly created
# @swamp/software-factory instance named `factory-design` (after `swamp model
# create` mints the UUID header). It is the design-interview state machine that
# the skill drives. Do not edit by hand in a consuming repo — re-pull the
# extension to refresh it.
#
# Append the lines below to the created instance file, replacing its
# `globalArguments: {}` line and its trailing `methods: {}` (keep `methods: {}`
# at the end).
globalArguments:
  stages:
    - id: domain
      initial: true
      description: >-
        Phase 1 — Domain. What knowledge work is this factory for? What is the
        finished artifact, and what document type/mode is it?
      work:
        mode: interactive
        skills: [factory-builder]
      artifacts:
        - name: domain-design
          schema:
            type: object
            required: [factoryName, knowledgeWork, artifactDescription]
            properties:
              factoryName: { type: string, minLength: 1 }
              knowledgeWork: { type: string, minLength: 1 }
              artifactDescription: { type: string, minLength: 1 }
              docType:
                type: string
                enum: [tutorial, how-to, reference, explanation, other]
      transitions:
        - name: next
          to: stages
          gates:
            - { type: artifact-exists, config: { artifact: domain-design } }

    - id: stages
      description: >-
        Phase 2 — Stages. The happy-path stage flow; per stage its work mode and
        whether it is deterministic (workflow/method) or judgement
        (interactive/dispatch).
      work:
        mode: interactive
        skills: [factory-builder]
      artifacts:
        - name: stage-design
          schema:
            type: object
            required: [stages]
            properties:
              stages:
                type: array
                minItems: 2
                items:
                  type: object
                  required: [id, kind]
                  properties:
                    id: { type: string, minLength: 1 }
                    kind: { type: string, enum: [initial, work, review, terminal] }
                    workMode:
                      type: string
                      enum: [interactive, dispatch, workflow, method]
                    deterministic: { type: boolean }
                    description: { type: string }
      transitions:
        - name: next
          to: artifacts
          gates:
            - { type: artifact-exists, config: { artifact: stage-design } }

    - id: artifacts
      description: >-
        Phase 3 — Artifacts & schemas. Per stage, the durable product and the
        invariants to lock in its schema (coverage contract, sources, claims).
      work:
        mode: interactive
        skills: [factory-builder]
      artifacts:
        - name: artifact-design
          schema:
            type: object
            required: [artifacts]
            properties:
              artifacts:
                type: array
                items:
                  type: object
                  required: [stageId, name, kind]
                  properties:
                    stageId: { type: string, minLength: 1 }
                    name: { type: string, minLength: 1 }
                    kind: { type: string, enum: [regular, findings] }
                    invariants: { type: array, items: { type: string } }
      transitions:
        - name: next
          to: adversary
          gates:
            - { type: artifact-exists, config: { artifact: artifact-design } }

    - id: adversary
      description: >-
        Phase 4 — The adversary. Who authors vs who reviews (polarity); what
        review must catch; which lenses/standards; external or dispatch; a
        mechanical linter first; how many cycles before escalation.
      work:
        mode: interactive
        skills: [factory-builder]
      artifacts:
        - name: lens-design
          # Every phase-4 question is a required field so a partial answer cannot
          # satisfy artifact-exists and advance (adversaryModel stays optional).
          schema:
            type: object
            required: [reviewer, lenses, author, adversary, standards, mechanicalLinterFirst, maxReviewCycles]
            properties:
              reviewer: { type: string, enum: [external, dispatch] }
              author:
                type: string
                enum: [claude, codex, gemini, opencode, amp]
              adversary:
                type: string
                enum: [claude, codex, gemini, opencode, amp]
              adversaryModel: { type: string }
              lenses: { type: array, minItems: 1, items: { type: string } }
              standards: { type: array, items: { type: string } }
              mechanicalLinterFirst: { type: boolean }
              maxReviewCycles: { type: integer, minimum: 1 }
      transitions:
        - name: next
          to: gates
          gates:
            - { type: artifact-exists, config: { artifact: lens-design } }

    - id: gates
      description: >-
        Phase 5 — Gates. Per transition, what must be provably true to leave the
        stage; where the one human sign-off is. Captured as gate intents (the
        assembler expands) or raw gate type + config.
      work:
        mode: interactive
        skills: [factory-builder]
      artifacts:
        - name: gate-design
          schema:
            type: object
            required: [transitions]
            properties:
              transitions:
                type: array
                minItems: 1
                items:
                  type: object
                  required: [stageId, name, to]
                  properties:
                    stageId: { type: string, minLength: 1 }
                    name: { type: string, minLength: 1 }
                    to: { type: string, minLength: 1 }
                    gateIntents: { type: array, items: { type: string } }
      transitions:
        - name: next
          to: assembly
          gates:
            - { type: artifact-exists, config: { artifact: gate-design } }

    - id: assembly
      description: >-
        Phase 6 — Assembly (deterministic). The builder consolidates the phase
        artifacts into one `design` artifact (the DesignRecord). Recording it
        fires the @atalanta/meta-factory REPORT, which reads the design and
        emits the target factory definition as json. No LLM, no assembler model.
      work:
        mode: interactive
        skills: [factory-builder]
      artifacts:
        - name: design
          schema:
            type: object
            additionalProperties: true
            required: [factoryName, stages]
            properties:
              factoryName: { type: string, minLength: 1 }
              stages: { type: array, minItems: 1 }
      transitions:
        - name: assembled
          to: confirm
          gates:
            - { type: artifact-exists, config: { artifact: design } }

    - id: confirm
      description: >-
        Phase 7 — Human confirm. Present the assembled definition (the assembler
        report's json) and the target's Mermaid; on approval the interview is done.
      work:
        mode: interactive
        skills: [factory-builder]
      transitions:
        - name: confirmed
          to: done
          manual: true
          gates:
            - { type: human-approval, config: { id: design-confirm } }
        - name: revise
          to: stages

    - id: done
      terminal: true

    - id: aborted
      terminal: true

  globalTransitions:
    - name: abort
      to: aborted
      gates:
        - type: human-approval
          config: { id: abort-confirmation }

reports:
  require:
    - { name: "@swamp/software-factory/work-item-summary", methods: [summary] }
    # The assembler report fires on record_artifact (self-guards to the `design`
    # artifact) and emits the target factory definition as json.
    - { name: "@atalanta/meta-factory", methods: [record_artifact] }
