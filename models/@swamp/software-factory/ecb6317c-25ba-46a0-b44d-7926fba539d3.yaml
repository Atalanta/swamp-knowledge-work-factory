type: '@swamp/software-factory'
typeVersion: 2026.06.24.1
id: ecb6317c-25ba-46a0-b44d-7926fba539d3
name: runbook
version: 1
tags: {}
# Generated by the factory-design interview (session KWF-RUNBOOK) via
# @atalanta/factory-assembler. Installed here as a live definition — a separate
# explicit step from the interview, per swamp's source/runtime split.
globalArguments:
  stages:
    - id: brief
      initial: true
      work:
        mode: interactive
      evidence:
        - name: brief
          schema:
            type: object
            properties:
              incidentType:
                type: string
                minLength: 1
              requiredSteps:
                type: array
                minItems: 1
                items:
                  type: string
            required:
              - incidentType
              - requiredSteps
      transitions:
        - name: start-drafting
          to: drafting
          gates:
            - type: evidence-recorded
              config:
                name: brief
    - id: drafting
      work:
        mode: interactive
        skills:
          - kw-review-lenses
      artifacts:
        - name: runbook
          schema:
            type: object
            properties:
              title:
                type: string
                minLength: 1
              body:
                type: string
                minLength: 1
              coveredSteps:
                type: array
                items:
                  type: string
            required:
              - title
              - body
      transitions:
        - name: submit
          to: review
          gates:
            - type: artifact-exists
              config:
                artifact: runbook
    - id: review
      work:
        mode: dispatch
        skills:
          - kw-review-lenses
        systemPrompt: "Run three external-reviewer passes over the runbook: structure, craft, tone."
      artifacts:
        - name: runbook-review
          kind: findings
          reviews: runbook
      transitions:
        - name: accept
          to: sign-off
          gates:
            - type: artifact-fresh
              config:
                artifact: runbook-review
                recordedThisCycle: true
            - type: findings-clear
              config:
                artifact: runbook-review
                blocking:
                  - critical
                  - high
        - name: rework
          to: drafting
    - id: sign-off
      work:
        mode: interactive
      transitions:
        - name: ship
          to: done
          manual: true
          gates:
            - type: human-approval
              config:
                id: sign-off
        - name: send-back
          to: drafting
    - id: done
      terminal: true
    - id: aborted
      terminal: true
  globalTransitions:
    - name: abort
      to: aborted
      gates:
        - type: human-approval
          config:
            id: abort-confirmation
reports:
  require:
    - name: "@swamp/software-factory/work-item-summary"
      methods:
        - summary
methods: {}
